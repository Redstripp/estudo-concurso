<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Estudo Concurso — Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variaveis.css">
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body class="tema-claro">

  <div id="tela-login" class="tela-auth">
    <div class="card-auth">
      <h1 class="logo">📚 Estudo Concurso</h1>
      <p class="subtitulo">Controle seus estudos com inteligência</p>

      <div class="abas">
        <button class="aba ativa" id="btn-aba-login">Entrar</button>
        <button class="aba" id="btn-aba-cadastro">Cadastrar</button>
      </div>

      <div id="form-login">
        <div class="campo">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com">
        </div>
        <div class="campo">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" placeholder="••••••••">
        </div>
        <button class="btn-primario" id="btn-entrar">Entrar</button>
        <p class="link-esqueceu">
          <a href="#" id="link-esqueceu-senha">Esqueceu a senha?</a>
        </p>
      </div>

      <div id="form-recuperar" class="escondido">
        <p class="texto-recuperar">Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>
        <div class="campo">
          <label for="recuperar-email">E-mail</label>
          <input type="email" id="recuperar-email" placeholder="seu@email.com">
        </div>
        <button class="btn-primario" id="btn-recuperar">Enviar link</button>
        <p class="link-esqueceu">
          <a href="#" id="link-voltar-login">← Voltar ao login</a>
        </p>
      </div>

      <div id="form-cadastro" class="escondido">
        <div class="campo">
          <label for="cad-nome">Nome</label>
          <input type="text" id="cad-nome" placeholder="Seu nome">
        </div>
        <div class="campo">
          <label for="cad-email">E-mail</label>
          <input type="email" id="cad-email" placeholder="seu@email.com">
        </div>
        <div class="campo">
          <label for="cad-senha">Senha</label>
          <input type="password" id="cad-senha" placeholder="mínimo 6 caracteres">
        </div>
        <button class="btn-primario" id="btn-cadastrar">Criar conta</button>
      </div>

      <p id="msg-auth" class="msg-feedback"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Configuração do Supabase - Substitua pelos dados do seu projeto
    const SUPABASE_URL = 'https://SEU-PROJETO.supabase.co';
    const SUPABASE_ANON_KEY = 'SUA_CHAVE_ANON_PUBLICA';
    
    // Opcional: e-mails que podem ver o bloco administrativo de protecao do banco.
    window.ADMIN_EMAILS = ['seu-email@exemplo.com'];
    
    // Inicializa o cliente Supabase
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>
  <script src="js/auth.js"></script>

  <script>
    // Detecta se veio de um link de recuperacao de senha
    const hash = window.location.hash
    if (hash.includes('type=recovery') && hash.includes('access_token')) {
      const destino = new URL(typeof obterUrlArquivo === 'function'
        ? obterUrlArquivo('app.html')
        : 'app.html',
      window.location.href)
      destino.search = ''
      destino.hash = hash.startsWith('#') ? hash.slice(1) : hash
      window.location.href = destino.href
    }
  </script>
  
</body>
</html>
